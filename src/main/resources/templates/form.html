<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Email form</title>
</head>
<body>

<div th:if="${success}">
    <p th:text="${success}"></p>
</div>

<form method="post" th:action="@{/email}" th:object="${email}">
    <input placeholder="mottagare" th:field="*{recipient}" type="text">
    <textarea placeholder="meddelande" th:field="*{message}"></textarea>
    <button type="submit">Skicka</button>
</form>

<hr>

<h3>Products</h3>
<ul>
    <li th:each="product : ${products}">
        <span th:text="${product.name}"></span>:
        <span th:text="${product.price}"></span>
    </li>
</ul>

<p>
    Total price: <strong th:text="${totalPrice}"></strong>
</p>

</body>
</html>
