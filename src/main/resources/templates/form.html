<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email form</title>
</head>
<body>


<div th:if="${success}">
    <p th:text="${success}"></p>
</div>

<form method="post" th:action="@{/email}" th:object="${email}">
    <input placeholder="mottagare" th:field="*{recipient}" type="text">
    <input placeholder="ämne" th:field="*{subject}">
    <input placeholder="meddelande" th:field="*{message}" type="text">
    <button type="submit">Skicka</button>
</form>

</body>
</html>
